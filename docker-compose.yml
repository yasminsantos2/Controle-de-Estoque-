version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_estoque
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: estoquedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata_estoque:/var/lib/postgresql/data
    networks:
      - estoque_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_estoque
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: 123
    ports:
      - "5050:80"
    networks:
      - estoque_network
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_estoque
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/estoquedb
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=123
    ports:
      - "8083:8083"
    networks:
      - estoque_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_estoque
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - estoque_network
    depends_on:
      - backend

networks:
  estoque_network:
    driver: bridge

volumes:
  pgdata_estoque:
